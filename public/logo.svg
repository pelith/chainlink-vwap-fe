<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <style>
    .border { fill: none; stroke: #388E99; stroke-width: 8; }
    .text-title { font-family: system-ui, -apple-system, sans-serif; font-size: 48px; font-weight: 800; fill: #1A4B57; text-anchor: middle; letter-spacing: 4px; }
    .text-sub { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 700; fill: #1A4B57; text-anchor: middle; letter-spacing: 2px; }
    .navy-stroke { fill: none; stroke: #1A4B57; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
    .teal-stroke { fill: none; stroke: #388E99; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
    .green-stroke { fill: none; stroke: #85B59E; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
    .fill-green { fill: #B2D4C3; }
    .fill-none { fill: none; }
  </style>

  <text x="200" y="315" class="text-title">SOUZU</text>
  <text x="200" y="340" class="text-sub">VWAP SETTLEMENT</text>

  <line x1="90" y1="260" x2="160" y2="260" class="navy-stroke" stroke-width="8" />
  <line x1="160" y1="260" x2="310" y2="260" class="green-stroke" stroke-width="8" />

  <circle cx="120" cy="235" r="20" class="fill-green navy-stroke" />

  <circle cx="230" cy="200" r="45" class="green-stroke" stroke-width="8" />
  <circle cx="230" cy="200" r="30" class="teal-stroke" />
  <polyline points="230,185 230,200 242,208" class="teal-stroke" />
  
  <rect x="175" y="180" width="24" height="40" rx="12" class="fill-none teal-stroke" stroke-width="8" />

  <path d="M 175 130 C 135 130 120 180 120 215" class="teal-stroke" stroke-width="8" />
  <path d="M 190 130 C 155 130 145 170 145 200" class="teal-stroke" stroke-width="4" />

  <g transform="rotate(-12, 220, 140)">
    <rect x="160" y="115" width="110" height="30" class="fill-green navy-stroke" />
    <rect x="270" y="115" width="45" height="30" class="fill-green navy-stroke" />
    <circle cx="230" cy="145" r="12" class="fill-green navy-stroke" />
  </g>
</svg>